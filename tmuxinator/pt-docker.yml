name: pt-docker
root: <%= ENV["PROJECTS_DIR"] %>/keet-umi
on_project_exit: clear

windows:
  - pt:
      layout: <%= ENV["MUX_LAYOUT"] %>
      panes:
        - editor:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
          - cls
          - nvim
        - devserver:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
          - cls
          - yarn env:docker
          - <%= ENV["EXPORT_E2E_CREDS_SCRIPT"] %> pt
          - yarn
          - yarn start
        - cmd:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
          - cls
