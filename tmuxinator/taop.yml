name: taop
root: <%= ENV["PROJECTS_DIR"] %>/TAOP
on_project_exit: clear

windows:
  - taop:
      layout: even-vertical
      panes:
        - sql:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - cd sql
          - fish
          - cls
        - data:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - cd data
          - fish
          - cls
