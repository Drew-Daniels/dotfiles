name: patient-docker
root: <%= ENV["PROJECTS_DIR"] %>/keet-patient
on_project_exit: clear

windows:
  - patient:
      layout: <%= ENV["MUX_LAYOUT"] %>
      panes:
        - editor:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
          - cls
          - nvim
        - devserver:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
          - cls
          - pnpm env:keet:docker
          - <%= ENV["EXPORT_E2E_CREDS_SCRIPT"] %> patient
          - pnpm i
          - pnpm start
        - cmd:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
          - cls
