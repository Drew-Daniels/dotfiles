name: patient-docker

root: <%= ENV["PROJECTS_DIR"] %>/keet-patient

windows:
  - patient:
      layout: <%= ENV["MUX_LAYOUT"] %>
      panes:
        - editor:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
          - nvim
        - git:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
        - devserver:
          - yarn env:docker && <%= ENV["EXPORT_E2E_CREDS_SCRIPT"] %> patient && yarn && yarn start
        - cmd:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
