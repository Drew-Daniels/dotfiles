name: auth-client
root: <%= ENV["PROJECTS_DIR"] %>/keet-auth-client
on_project_exit: clear

windows:
  - pt:
      layout: <%= ENV["MUX_LAYOUT"] %>
      panes:
        - editor:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
          - nvim
        - cmd:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
        - notes:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
          - nvim -c ":Neorg workspace auth_client"
