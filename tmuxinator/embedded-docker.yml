name: embedded-docker
root: <%= ENV["PROJECTS_DIR"] %>/keet-embedded

windows:
  - embedded:
      layout: <%= ENV["MUX_LAYOUT"] %>
      panes:
        - editor:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
          - nvim
        - git:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
        - devserver:
          - yarn env:docker && <%= ENV["EXPORT_E2E_CREDS_SCRIPT"] %> embedded && yarn && yarn start
        - cmd:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
