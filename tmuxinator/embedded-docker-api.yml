name: embedded-docker-api
root: <%= ENV["PROJECTS_DIR"] %>

startup_window: embedded

windows:
  - api:
      root: <%= ENV["PROJECTS_DIR"] %>/keet-api
      layout: <%= ENV["MUX_LAYOUT"] %>
      panes:
        - ahoy up
        - fish
  - embedded:
      root: <%= ENV["PROJECTS_DIR"] %>/keet-embedded
      layout: <%= ENV["MUX_LAYOUT"] %>
      panes:
        - nvim
        - fish
        - yarn env:docker && <%= ENV["EXPORT_E2E_CREDS_SCRIPT"] %> embedded && yarn start
        - fish
