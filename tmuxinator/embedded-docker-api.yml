name: embedded-docker-api
root: <%= ENV["PROJECTS_DIR"] %>

startup_window: embedded

windows:
  - api:
      root: <%= ENV["PROJECTS_DIR"] %>/keet-api
      layout: main-vertical
      panes:
        - ahoy up
        - fish
  - embedded:
      root: <%= ENV["PROJECTS_DIR"] %>/keet-embedded
      layout: main-vertical
      panes:
        - nvim
        - fish
        - yarn env:docker && yarn start
