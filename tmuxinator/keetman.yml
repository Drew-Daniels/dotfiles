name: keetman
root: <%= ENV["PROJECTS_DIR"] %>/keetman
on_project_exit: clear

windows:
  - keetman:
      layout: <%= ENV["MUX_LAYOUT"] %>
      panes:
        - editor:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
          - nvim -c ":vs | vs"
        - cmd:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
        - env:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
          - nvim hurl/hurl.env
        - notes:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
          - nvim -c ":Neorg workspace keetman"
