name: embedded-local
root: <%= ENV["PROJECTS_DIR"] %>/keet-embedded
on_project_exit: clear

windows:
  - embedded:
      layout: <%= ENV["MUX_LAYOUT"] %>
      panes:
        - editor:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
          - cls
          - nvim
        - devserver:
          - fish
          - cls
          - yarn env:local
          - yarn
          - yarn start
        - cmd:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
          - cls
