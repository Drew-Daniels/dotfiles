name: ptnow-local
root: <%= ENV["PROJECTS_DIR"] %>/ptnow-patient

windows:
  - pt:
      layout: <%= ENV["MUX_LAYOUT"] %>
      panes:
        - editor:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
          - nvim
        - git:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
        - devserver:
          - yarn env:local && yarn && yarn start
        - cmd:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
