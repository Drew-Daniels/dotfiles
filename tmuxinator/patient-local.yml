name: patient-local
root: <%= ENV["PROJECTS_DIR"] %>/keet-patient

windows:
  - pt:
      layout: <%= ENV["MUX_LAYOUT"] %>
      panes:
        - editor:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
          - nvim
        - git:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
        - devserver:
          - yarn env:local
          - yarn
          - yarn start
        - cmd:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
