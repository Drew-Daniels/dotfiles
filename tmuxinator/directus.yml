name: directus
root: <%= ENV["PROJECTS_DIR"] %>/directus
on_project_exit: clear

windows:
  - editor:
      layout: <%= ENV["MUX_LAYOUT"] %>
      panes:
        - editor:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
          - cls
          - nvim
        - devserver:
          - fish
          - cls
        - cmd:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
          - cls
  - stack:
      layout: <%= ENV["MUX_LAYOUT"] %>
      panes:
        - services:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
          - cls
          # - docker-compose up --build
