name: android
root: <%= ENV["PROJECTS_DIR"] %>/keet-mobile

windows:
  - admin:
      layout: <%= ENV["MUX_LAYOUT"] %>
      panes:
        - editor:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
          - nvim
        - git:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
        - devserver:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - yarn
          - yarn android
        - cmd:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
