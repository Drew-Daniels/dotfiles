name: ptnow-docker
root: <%= ENV["PROJECTS_DIR"] %>/keet-patient
on_project_exit: clear

windows:
  - ptnow:
      layout: <%= ENV["MUX_LAYOUT"] %>
      panes:
        - editor:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
          - cls
          - nvim
        - devserver:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
          - cls
          - yarn env:ptnow:docker
          - <%= ENV["EXPORT_E2E_CREDS_SCRIPT"] %> ptnow
          - yarn
          - yarn start
        - cmd:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
          - cls
