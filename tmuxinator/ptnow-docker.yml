name: ptnow-docker
root: <%= ENV["PROJECTS_DIR"] %>/ptnow-patient

windows:
  - ptnow:
      layout: <%= ENV["MUX_LAYOUT"] %>
      panes:
        - editor:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
          - nvim
        - git:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
        - devserver:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - yarn env:docker
          - <%= ENV["EXPORT_E2E_CREDS_SCRIPT"] %> ptnow
          - yarn
          - yarn start
        - cmd:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
