name: fhir
root: <%= ENV["PROJECTS_DIR"] %>/hapi-fhir-jpa-server
on_project_exit: clear

windows:
  - editor:
      layout: <%= ENV["MUX_LAYOUT"] %>
      panes:
        - editor:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
          - cls
          - nvim
        - devserver:
          - fish
          - cls
        - cmd:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
          - cls
  - hapi-fhir-postgres:
      layout: <%= ENV["MUX_LAYOUT"] %>
      panes:
        - postgres:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
          - cls
          - docker compose up hapi-fhir-postgres
  - jetty:run:
      layout: <%= ENV["MUX_LAYOUT"] %>
      panes:
        - mvn-jetty-run:
            - <%= ENV["MUXLSHELL_RUN_CMD"] %>
            - fish
            - cls
            - sleep 10
            - mvn jetty:run
