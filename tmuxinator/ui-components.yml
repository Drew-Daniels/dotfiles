name: ui-components
root: <%= ENV["PROJECTS_DIR"] %>/ui-components
on_project_exit: clear

windows:
  - pt:
      layout: <%= ENV["MUX_LAYOUT"] %>
      panes:
        - editor:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
          - nvim
        - git:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - yarn
          - fish
        - cmd:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
