name: android
root: <%= ENV["PROJECTS_DIR"] %>/keet-mobile
on_project_exit: clear

windows:
  - android:
      layout: <%= ENV["MUX_LAYOUT"] %>
      panes:
        - editor:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - nvim
        - devserver:
          - fish
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - yarn setup qa
          - yarn
          - yarn android
        - cmd:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
