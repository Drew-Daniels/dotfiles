name: engage
root: <%= ENV["PROJECTS_DIR"] %>/engage
on_project_exit: clear

windows:
  - web:
      layout: <%= ENV["MUX_LAYOUT"] %>
      panes:
        - editor:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
          - cls
          - nvim
        - devserver:
          - fish
          - cls
        - cmd:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
          - cls
  - api:
      layout: <%= ENV["MUX_LAYOUT"] %>
      panes:
        - editor:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
          - cls
          - nvim
        - devserver:
          - fish
          - cls
        - cmd:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
          - cls
  - stack:
      layout: even-horizontal
      panes: 
        - rest:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
          - cls
          - docker compose up
        - dev:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
          - cls
          - docker compose stop api web
          - npx dotenv -e .env -- yarn dev --filter="api" --filter="web"
