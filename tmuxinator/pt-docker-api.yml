name: pt-docker-api
root: <%= ENV["PROJECTS_DIR"] %>

startup_window: pt

windows:
  - api:
      root: <%= ENV["PROJECTS_DIR"] %>/keet-api
      layout: <%= ENV["MUX_LAYOUT"] %>
      panes:
        - ahoy up
        - fish
  - pt:
      root: <%= ENV["PROJECTS_DIR"] %>/keet-umi
      layout: <%= ENV["MUX_LAYOUT"] %>
      panes:
        - nvim
        - fish
        - yarn env:docker && yarn start
