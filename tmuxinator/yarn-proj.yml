name: yarn-proj
root: <%= ENV["PROJECTS_DIR"] %>/<%= @args[0] %>
on_project_exit: clear

windows:
  - npm-proj:
      layout: <%= ENV["MUX_LAYOUT"] %>
      panes:
        - editor:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
          - nvim
        - devserver:
          - fish
          - yarn
          - yarn start
        - cmd:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
