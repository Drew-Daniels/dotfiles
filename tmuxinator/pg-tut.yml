name: pg-tut
root: <%= ENV["PROJECTS_DIR"] %>/postgres/src/tutorial
on_project_exit: clear

windows:
  - pg-tut:
      layout: 0f71,217x48,0,0[217x33,0,0{108x33,0,0,10,108x33,109,0,11},217x14,0,34,12]
      panes:
        - sql:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
          - cls
        - data:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
          - cls
        - shell:
          - fish
          - cls

