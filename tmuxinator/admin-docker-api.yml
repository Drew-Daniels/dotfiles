name: admin-docker-api
root: <%= ENV["PROJECTS_DIR"] %>
startup_window: admin
on_project_exit: clear

windows:
  - api:
      root: <%= ENV["PROJECTS_DIR"] %>/keet-api
      layout: <%= ENV["MUX_LAYOUT"] %>
      panes:
        - services:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
          - ahoy up
  - admin:
      root: <%= ENV["PROJECTS_DIR"] %>/keet-admin
      layout: <%= ENV["MUX_LAYOUT"] %>
      panes:
        - editor:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
          - nvim
        - devserver:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
          - yarn env:docker
          - <%= ENV["EXPORT_E2E_CREDS_SCRIPT"] %> admin
          - yarn
          - yarn start
        - cmd:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
