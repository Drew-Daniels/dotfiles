name: api
root: <%= ENV["PROJECTS_DIR"] %>/keet-api
on_project_exit: clear

windows:
  - editor:
      layout: <%= ENV["MUX_LAYOUT"] %>
      panes:
        - editor:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
          - nvim
        - cmd:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
        - notes:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
          - nvim -c ":Neorg workspace api"
  - stack:
      layout: <%= ENV["MUX_LAYOUT"] %> 
      panes:
        - services:
          - <%= ENV["MUXLSHELL_RUN_CMD"] %>
          - fish
          - ahoy up
