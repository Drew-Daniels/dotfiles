session_name: dotfiles
start_directory: "${PROJECTS_DIR}/dotfiles"
after_script: clear

windows:
- layout: main-vertical
  panes:
  - editor:
      - shell_command:
        - "$MUXLSHELL_RUN_CMD"
        - fish
        - cls
        - nvim
  - cmd:
      - shell_command:
        - "$MUXLSHELL_RUN_CMD"
        - fish
        - cls
  window_name: dotfiles
