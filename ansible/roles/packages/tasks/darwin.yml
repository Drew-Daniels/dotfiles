---
- name: Get brew prefix
  ansible.builtin.command:
    cmd: brew --prefix
  register: brew_prefix
  changed_when: false

- name: Generate Brewfile
  ansible.builtin.copy:
    dest: "{{ ansible_facts['env'].HOME }}/.local/share/chezmoi/ansible/.Brewfile"
    mode: "0644"
    content: |
      {% for tap in homebrew_taps %}
      tap "{{ tap }}"
      {% endfor %}
      {% if home_or_work == "home" %}
      {% for tap in homebrew_home_taps %}
      tap "{{ tap }}"
      {% endfor %}
      {% endif %}
      {% if home_or_work == "work" %}
      {% for tap in homebrew_work_taps %}
      tap "{{ tap }}"
      {% endfor %}
      {% endif %}
      {% for brew in homebrew_head_brews %}
      brew "{{ brew }}", args: ["HEAD"]
      {% endfor %}
      {% if home_or_work == "home" %}
      {% for brew in homebrew_home_head_brews %}
      brew "{{ brew }}", args: ["HEAD"]
      {% endfor %}
      {% endif %}
      {% if home_or_work == "work" %}
      {% for brew in homebrew_work_head_brews %}
      brew "{{ brew }}", args: ["HEAD"]
      {% endfor %}
      {% endif %}
      {% for brew in homebrew_brews %}
      brew "{{ brew }}"
      {% endfor %}
      {% if home_or_work == "home" %}
      {% for brew in homebrew_home_brews %}
      brew "{{ brew }}"
      {% endfor %}
      {% endif %}
      {% if home_or_work == "work" %}
      {% for brew in homebrew_work_brews %}
      brew "{{ brew }}"
      {% endfor %}
      {% endif %}
      {% for cask in homebrew_no_quarantine_casks %}
      cask "{{ cask }}", args: { no_quarantine: true }
      {% endfor %}
      {% if home_or_work == "home" %}
      {% for cask in homebrew_home_no_quarantine_casks %}
      cask "{{ cask }}", args: { no_quarantine: true }
      {% endfor %}
      {% endif %}
      {% if home_or_work == "work" %}
      {% for cask in homebrew_work_no_quarantine_casks %}
      cask "{{ cask }}", args: { no_quarantine: true }
      {% endfor %}
      {% endif %}
      {% for cask in homebrew_casks %}
      cask "{{ cask }}"
      {% endfor %}
      {% if home_or_work == "home" %}
      {% for cask in homebrew_home_casks %}
      cask "{{ cask }}"
      {% endfor %}
      {% endif %}
      {% if home_or_work == "work" %}
      {% for cask in homebrew_work_casks %}
      cask "{{ cask }}"
      {% endfor %}
      {% endif %}
      {% for name, id in homebrew_mas_apps.items() %}
      mas "{{ name }}", id: {{ id }}
      {% endfor %}
      {% if home_or_work == "home" %}
      {% for name, id in homebrew_home_mas_apps.items() %}
      mas "{{ name }}", id: {{ id }}
      {% endfor %}
      {% endif %}
      {% if home_or_work == "work" %}
      {% for name, id in homebrew_work_mas_apps.items() %}
      mas "{{ name }}", id: {{ id }}
      {% endfor %}
      {% endif %}
  register: brewfile_result

- name: Fix vacuum symlink conflict
  ansible.builtin.command:
    cmd: brew link --overwrite vacuum
  register: vacuum_link
  changed_when: "'symlinks created' in vacuum_link.stdout"
  failed_when: false

- name: Check if all brew dependencies are satisfied
  ansible.builtin.command:
    cmd: "brew bundle check --file={{ ansible_facts['env'].HOME }}/.local/share/chezmoi/ansible/.Brewfile"
  environment:
    HOMEBREW_NO_AUTO_UPDATE: "1"
  register: brew_check
  changed_when: false
  failed_when: false

- name: Install packages via brew bundle
  when: brewfile_result.changed or brew_check.rc != 0
  ansible.builtin.command:
    cmd: "brew bundle --file={{ ansible_facts['env'].HOME }}/.local/share/chezmoi/ansible/.Brewfile --cleanup"
  environment:
    HOMEBREW_NO_AUTO_UPDATE: "1"
  register: brew_bundle_result
  changed_when: "'Installing' in brew_bundle_result.stdout or 'Upgrading' in brew_bundle_result.stdout or 'Uninstalling' in brew_bundle_result.stdout"
  failed_when: false

- name: Show brew bundle activity
  ansible.builtin.debug:
    msg: "{{ brew_bundle_result.stdout_lines | select('search', 'Installing|Upgrading|Uninstalling') | list }}"
  when:
    - brew_bundle_result is not skipped
    - brew_bundle_result.stdout_lines | select('search', 'Installing|Upgrading|Uninstalling') | list | length > 0

- name: Warn about brew bundle failures
  ansible.builtin.debug:
    msg: "{{ brew_bundle_result.stderr_lines }}"
  when:
    - brew_bundle_result is not skipped
    - brew_bundle_result.rc != 0
    - brew_bundle_result.stderr_lines | default([]) | length > 0

- name: Remove stale homebrew gitconfig
  ansible.builtin.file:
    path: /opt/homebrew/etc/gitconfig
    state: absent

# block-goose-cli installs a 'goose' binary that conflicts with other packages
- name: Unlink block-goose-cli
  ansible.builtin.command:
    cmd: brew unlink block-goose-cli
  changed_when: false
  failed_when: false

- name: Symlink goose as goose-cli
  ansible.builtin.file:
    src: "{{ brew_prefix.stdout }}/opt/block-goose-cli/bin/goose"
    dest: "{{ brew_prefix.stdout }}/bin/goose-cli"
    state: link
    force: true
  failed_when: false
