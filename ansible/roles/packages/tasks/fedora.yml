---
- name: Upgrade all packages
  become: true
  ansible.builtin.dnf:
    name: "*"
    state: latest

- name: Install DNF packages
  become: true
  ansible.builtin.dnf:
    name: "{{ fedora_dnf_packages + fedora_ruby_build_deps }}"
    state: present

- name: Enable COPR repos
  become: true
  community.general.copr:
    name: "{{ item }}"
    state: enabled
  loop: "{{ fedora_copr_repos }}"

- name: Install COPR packages
  become: true
  ansible.builtin.dnf:
    name: "{{ fedora_copr_packages }}"
    state: present

- name: Install crates
  ansible.builtin.command:
    cmd: "cargo install --locked {{ fedora_crate_packages | join(' ') }}"
  register: crate_result
  changed_when: "'Compiling' in crate_result.stderr | default('')"
  failed_when: crate_result.rc != 0

- name: Install npm packages
  ansible.builtin.command:
    cmd: "npm i -g {{ fedora_npm_packages | join(' ') }}"
  register: npm_result
  changed_when: "'added' in npm_result.stdout | default('')"
