# ---- usbimager ----
- name: Get latest usbimager version
  ansible.builtin.shell:
    cmd: "curl -sL https://gitlab.com/bztsrc/usbimager/-/releases.atom | xmlstarlet sel -N atom='http://www.w3.org/2005/Atom' -t -v '/atom:feed/atom:entry[1]/atom:title' | cut -d ' ' -f2"
  register: usbimager_latest
  changed_when: false
  failed_when: false

- name: Get current usbimager version
  ansible.builtin.shell:
    cmd: "usbimager --version 2>/dev/null"
  register: usbimager_current
  changed_when: false
  failed_when: false

- name: Install/upgrade usbimager
  when: usbimager_current.stdout | default('') != usbimager_latest.stdout | default('')
  block:
    - name: Download usbimager deb
      ansible.builtin.get_url:
        url: "https://gitlab.com/bztsrc/usbimager/-/raw/binaries/usbimager_{{ usbimager_latest.stdout }}-amd64.deb"
        dest: /tmp/usbimager.deb
        mode: "0644"

    - name: Install usbimager
      become: true
      ansible.builtin.apt:
        deb: /tmp/usbimager.deb

    - name: Clean up usbimager deb
      ansible.builtin.file:
        path: /tmp/usbimager.deb
        state: absent

# ---- Obsidian ----
- name: Get latest Obsidian release
  ansible.builtin.uri:
    url: https://api.github.com/repos/obsidianmd/obsidian-releases/releases/latest
    headers: "{{ github_api_headers }}"
    return_content: true
  register: obsidian_release

- name: Get current Obsidian version
  ansible.builtin.shell:
    cmd: "dpkg -s obsidian 2>/dev/null | grep '^Version' | cut -d ' ' -f2"
  register: obsidian_current
  changed_when: false
  failed_when: false

- name: Set Obsidian version facts
  ansible.builtin.set_fact:
    obsidian_latest: "{{ obsidian_release.json.tag_name | regex_replace('^v', '') }}"
    obsidian_installed: "{{ obsidian_current.stdout | default('') }}"

- name: Install/upgrade Obsidian
  when: obsidian_installed != obsidian_latest
  block:
    - name: Download Obsidian deb
      ansible.builtin.get_url:
        url: "https://github.com/obsidianmd/obsidian-releases/releases/download/v{{ obsidian_latest }}/obsidian_{{ obsidian_latest }}_amd64.deb"
        dest: /tmp/obsidian.deb
        mode: "0644"

    - name: Install Obsidian
      become: true
      ansible.builtin.apt:
        deb: /tmp/obsidian.deb

    - name: Clean up Obsidian deb
      ansible.builtin.file:
        path: /tmp/obsidian.deb
        state: absent

# ---- HashiCorp terraform-ls ----
- name: Check if terraform-ls is installed
  ansible.builtin.command:
    cmd: which terraform-ls
  register: terraform_ls_check
  changed_when: false
  failed_when: false

- name: Install terraform-ls on Debian
  when: terraform_ls_check.rc != 0
  become: true
  block:
    - name: Add HashiCorp GPG key
      ansible.builtin.shell:
        cmd: wget -O- https://apt.releases.hashicorp.com/gpg | gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
        creates: /usr/share/keyrings/hashicorp-archive-keyring.gpg

    - name: Add HashiCorp repository
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ ansible_facts['architecture'] }} signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com {{ ansible_facts['distribution_release'] }} main"
        filename: hashicorp
        state: present

    - name: Install terraform-ls
      ansible.builtin.apt:
        name: terraform-ls
        state: present
        update_cache: true

# ---- cryptsetup ----
- name: Install cryptsetup
  become: true
  ansible.builtin.apt:
    name: cryptsetup
    state: present

# ---- cargo-update ----
- name: Install cargo-update
  ansible.builtin.command:
    cmd: cargo install cargo-update
  register: cargo_update_result
  changed_when: "'Installed' in cargo_update_result.stderr | default('')"
  failed_when: false

# ---- tidal-dl-ng ----
- name: Get latest tidal-dl-ng release
  ansible.builtin.uri:
    url: https://api.github.com/repos/exislow/tidal-dl-ng/releases/latest
    headers: "{{ github_api_headers }}"
    return_content: true
  register: tidal_release

- name: Get current tidal-dl-ng version
  ansible.builtin.shell:
    cmd: "tidal-dl-ng --version 2>/dev/null"
  register: tidal_current
  changed_when: false
  failed_when: false

- name: Install/upgrade tidal-dl-ng
  when: tidal_current.stdout | default('') != (tidal_release.json.tag_name | regex_replace('^v', ''))
  ansible.builtin.pip:
    name: "tidal-dl-ng[gui]"
    state: latest

# ---- beets ----
- name: Get latest beets release
  ansible.builtin.uri:
    url: https://api.github.com/repos/beetbox/beets/releases/latest
    headers: "{{ github_api_headers }}"
    return_content: true
  register: beets_release

- name: Get current beets version
  ansible.builtin.shell:
    cmd: "beet --version | head -n1 | cut -d ' ' -f3"
  register: beets_current
  changed_when: false
  failed_when: false

- name: Install/upgrade beets
  when: beets_current.stdout | default('') != (beets_release.json.tag_name | regex_replace('^v', ''))
  ansible.builtin.pip:
    name: beets
    state: latest
