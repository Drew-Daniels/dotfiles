# ---- HashiCorp terraform-ls ----
- name: Check if terraform-ls is installed
  ansible.builtin.command:
    cmd: which terraform-ls
  register: terraform_ls_check
  changed_when: false
  failed_when: false

- name: Install terraform-ls on Debian
  when: terraform_ls_check.rc != 0
  become: true
  block:
    - name: Add HashiCorp GPG key
      ansible.builtin.shell:
        cmd: wget -O- https://apt.releases.hashicorp.com/gpg | gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
        creates: /usr/share/keyrings/hashicorp-archive-keyring.gpg

    - name: Add HashiCorp repository
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ ansible_facts['architecture'] }} signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com {{ ansible_facts['distribution_release'] }} main"
        filename: hashicorp
        state: present

    - name: Install terraform-ls
      ansible.builtin.apt:
        name: terraform-ls
        state: present
        update_cache: true

# ---- cryptsetup ----
- name: Install cryptsetup
  become: true
  ansible.builtin.apt:
    name: cryptsetup
    state: present

# ---- cargo-update ----
- name: Install cargo-update
  ansible.builtin.command:
    cmd: cargo install cargo-update
  register: cargo_update_result
  changed_when: "'Installed' in cargo_update_result.stderr | default('')"
  failed_when: false
