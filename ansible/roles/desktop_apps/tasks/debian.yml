    - name: Add Zulip repository
      ansible.builtin.apt_repository:
        repo: "deb https://download.zulip.com/desktop/apt stable main"
        filename: zulip-desktop
        state: present

    - name: Install Zulip
      ansible.builtin.apt:
        name: zulip
        state: present
        update_cache: true

