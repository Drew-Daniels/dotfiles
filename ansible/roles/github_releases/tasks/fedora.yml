---
# ---- cosign ----
- name: Get latest cosign release
  ansible.builtin.uri:
    url: https://api.github.com/repos/sigstore/cosign/releases/latest
    headers: "{{ github_api_headers }}"
    return_content: true
  register: cosign_release

- name: Get current cosign version
  ansible.builtin.shell:
    cmd: "cosign version 2>/dev/null | grep GitVersion | awk '{print $2}'"
  register: cosign_current
  changed_when: false
  failed_when: false

- name: Set cosign version facts
  ansible.builtin.set_fact:
    cosign_latest: "{{ cosign_release.json.tag_name | regex_replace('^v', '') }}"
    cosign_installed: "{{ cosign_current.stdout | default('') }}"

- name: Install/upgrade cosign
  when: cosign_installed != cosign_latest
  block:
    - name: Download cosign RPM
      ansible.builtin.get_url:
        url: "https://github.com/sigstore/cosign/releases/download/v{{ cosign_latest }}/cosign-{{ cosign_latest }}-1.x86_64.rpm"
        dest: /tmp/cosign.rpm
        mode: "0644"

    - name: Install cosign RPM
      become: true
      ansible.builtin.dnf:
        name: /tmp/cosign.rpm
        state: present
        disable_gpg_check: true

    - name: Clean up cosign RPM
      ansible.builtin.file:
        path: /tmp/cosign.rpm
        state: absent

# ---- chezmoi (requires cosign for signature verification) ----
- name: Get latest chezmoi release
  ansible.builtin.uri:
    url: https://api.github.com/repos/twpayne/chezmoi/releases/latest
    headers: "{{ github_api_headers }}"
    return_content: true
  register: chezmoi_release

- name: Get current chezmoi version
  ansible.builtin.shell:
    cmd: "chezmoi --version | cut -d ' ' -f3 | cut -d 'v' -f2 | cut -d ',' -f1"
  register: chezmoi_current
  changed_when: false
  failed_when: false

- name: Set chezmoi version facts
  ansible.builtin.set_fact:
    chezmoi_latest: "{{ chezmoi_release.json.tag_name | regex_replace('^v', '') }}"
    chezmoi_installed: "{{ chezmoi_current.stdout | default('') }}"

- name: Install/upgrade chezmoi
  when: chezmoi_installed != chezmoi_latest
  block:
    - name: Download chezmoi RPM and verification files
      ansible.builtin.get_url:
        url: "https://github.com/twpayne/chezmoi/releases/download/v{{ chezmoi_latest }}/{{ item }}"
        dest: "/tmp/{{ item }}"
        mode: "0644"
      loop:
        - "chezmoi_{{ chezmoi_latest }}_linux_amd64.rpm"
        - "chezmoi_{{ chezmoi_latest }}_checksums.txt"
        - "chezmoi_{{ chezmoi_latest }}_checksums.txt.sig"
        - "chezmoi_cosign.pub"

    - name: Verify cosign signature on chezmoi checksums
      ansible.builtin.command:
        cmd: >
          cosign verify-blob
          --key /tmp/chezmoi_cosign.pub
          --signature /tmp/chezmoi_{{ chezmoi_latest }}_checksums.txt.sig
          /tmp/chezmoi_{{ chezmoi_latest }}_checksums.txt
      changed_when: false

    - name: Verify chezmoi RPM checksum
      ansible.builtin.shell:
        cmd: |
          expected=$(grep linux_amd64.rpm /tmp/chezmoi_{{ chezmoi_latest }}_checksums.txt)
          actual=$(cd /tmp && sha256sum chezmoi_{{ chezmoi_latest }}_linux_amd64.rpm)
          [ "$actual" = "$expected" ]
      changed_when: false

    - name: Install chezmoi RPM
      become: true
      ansible.builtin.dnf:
        name: "/tmp/chezmoi_{{ chezmoi_latest }}_linux_amd64.rpm"
        state: present
        disable_gpg_check: true

    - name: Clean up chezmoi files
      ansible.builtin.file:
        path: "/tmp/{{ item }}"
        state: absent
      loop:
        - "chezmoi_{{ chezmoi_latest }}_linux_amd64.rpm"
        - "chezmoi_{{ chezmoi_latest }}_checksums.txt"
        - "chezmoi_{{ chezmoi_latest }}_checksums.txt.sig"
        - "chezmoi_cosign.pub"

# ---- dbeaver ----
- name: Check if dbeaver is installed
  ansible.builtin.command:
    cmd: which dbeaver
  register: dbeaver_check
  changed_when: false
  failed_when: false

- name: Install dbeaver
  when: dbeaver_check.rc != 0
  block:
    - name: Download dbeaver RPM
      ansible.builtin.get_url:
        url: https://dbeaver.io/files/dbeaver-ce-latest-stable.x86_64.rpm
        dest: /tmp/dbeaver.rpm
        mode: "0644"

    - name: Install dbeaver RPM
      become: true
      ansible.builtin.dnf:
        name: /tmp/dbeaver.rpm
        state: present
        disable_gpg_check: true

    - name: Clean up dbeaver RPM
      ansible.builtin.file:
        path: /tmp/dbeaver.rpm
        state: absent

# ---- terraform-ls ----
- name: Get latest terraform-ls release
  ansible.builtin.uri:
    url: https://api.github.com/repos/hashicorp/terraform-ls/releases/latest
    headers: "{{ github_api_headers }}"
    return_content: true
  register: terraform_ls_release

- name: Get current terraform-ls version
  ansible.builtin.shell:
    cmd: "terraform-ls version | head -n1 | cut -d ' ' -f2"
  register: terraform_ls_current
  changed_when: false
  failed_when: false

- name: Set terraform-ls version facts
  ansible.builtin.set_fact:
    terraform_ls_latest: "{{ terraform_ls_release.json.tag_name | regex_replace('^v', '') }}"
    terraform_ls_installed: "{{ terraform_ls_current.stdout | default('') }}"

- name: Install/upgrade terraform-ls
  when: terraform_ls_installed != terraform_ls_latest
  block:
    - name: Download terraform-ls
      ansible.builtin.get_url:
        url: "https://releases.hashicorp.com/terraform-ls/{{ terraform_ls_latest }}/terraform-ls_{{ terraform_ls_latest }}_linux_amd64.zip"
        dest: /tmp/terraform-ls.zip
        mode: "0644"

    - name: Extract terraform-ls
      ansible.builtin.unarchive:
        src: /tmp/terraform-ls.zip
        dest: /tmp
        remote_src: true

    - name: Install terraform-ls
      become: true
      ansible.builtin.copy:
        src: /tmp/terraform-ls
        dest: /usr/local/bin/terraform-ls
        remote_src: true
        mode: "0755"

    - name: Clean up terraform-ls
      ansible.builtin.file:
        path: /tmp/terraform-ls.zip
        state: absent

# ---- typos-lsp ----
- name: Install typos-lsp via cargo binstall
  ansible.builtin.command:
    cmd: cargo binstall --git https://github.com/tekumara/typos-lsp typos-lsp -y
  register: typos_lsp_result
  changed_when: "'Installed' in typos_lsp_result.stderr | default('')"
  failed_when: false

# ---- marksman ----
- name: Get latest marksman release
  ansible.builtin.uri:
    url: https://api.github.com/repos/artempyanykh/marksman/releases/latest
    headers: "{{ github_api_headers }}"
    return_content: true
  register: marksman_release

- name: Get current marksman version
  ansible.builtin.shell:
    cmd: "marksman --version 2>/dev/null"
  register: marksman_current
  changed_when: false
  failed_when: false

- name: Install/upgrade marksman
  when: marksman_current.stdout | default('') != marksman_release.json.tag_name
  block:
    - name: Download marksman
      ansible.builtin.get_url:
        url: "https://github.com/artempyanykh/marksman/releases/download/{{ marksman_release.json.tag_name }}/marksman-linux-x64"
        dest: /tmp/marksman
        mode: "0755"

    - name: Install marksman
      become: true
      ansible.builtin.copy:
        src: /tmp/marksman
        dest: /usr/local/bin/marksman
        remote_src: true
        mode: "0755"

    - name: Clean up marksman
      ansible.builtin.file:
        path: /tmp/marksman
        state: absent

# ---- lua-language-server ----
- name: Get latest lua-language-server release
  ansible.builtin.uri:
    url: https://api.github.com/repos/LuaLS/lua-language-server/releases/latest
    headers: "{{ github_api_headers }}"
    return_content: true
  register: lua_ls_release

- name: Get current lua-language-server version
  ansible.builtin.shell:
    cmd: "lua-language-server --version 2>/dev/null"
  register: lua_ls_current
  changed_when: false
  failed_when: false

- name: Install/upgrade lua-language-server
  when: lua_ls_current.stdout | default('') != lua_ls_release.json.tag_name
  block:
    - name: Download lua-language-server
      ansible.builtin.get_url:
        url: "https://github.com/LuaLS/lua-language-server/releases/download/{{ lua_ls_release.json.tag_name }}/lua-language-server-{{ lua_ls_release.json.tag_name }}-linux-x64.tar.gz"
        dest: /tmp/lua-ls.tar.gz
        mode: "0644"

    - name: Create extraction directory
      ansible.builtin.file:
        path: /tmp/lua-ls-extract
        state: directory
        mode: "0755"

    - name: Extract lua-language-server
      ansible.builtin.unarchive:
        src: /tmp/lua-ls.tar.gz
        dest: /tmp/lua-ls-extract
        remote_src: true

    - name: Install lua-language-server
      become: true
      ansible.builtin.copy:
        src: /tmp/lua-ls-extract/bin/lua-language-server
        dest: /usr/local/bin/lua-language-server
        remote_src: true
        mode: "0755"

    - name: Clean up lua-language-server
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/lua-ls.tar.gz
        - /tmp/lua-ls-extract

