---
# ---- cosign ----
- name: Check if cosign is installed
  ansible.builtin.command:
    cmd: which cosign
  register: cosign_check
  changed_when: false
  failed_when: false

- name: Install cosign
  when: cosign_check.rc != 0
  block:
    - name: Get latest cosign release
      ansible.builtin.uri:
        url: https://api.github.com/repos/sigstore/cosign/releases/latest
        return_content: true
      register: cosign_release

    - name: Set cosign version
      ansible.builtin.set_fact:
        cosign_version: "{{ cosign_release.json.tag_name | regex_replace('^v', '') }}"

    - name: Download cosign RPM
      ansible.builtin.get_url:
        url: "https://github.com/sigstore/cosign/releases/latest/download/cosign-{{ cosign_version }}-1.x86_64.rpm"
        dest: /tmp/cosign.rpm
        mode: "0644"

    - name: Install cosign RPM
      become: true
      ansible.builtin.dnf:
        name: /tmp/cosign.rpm
        state: present
        disable_gpg_check: true

    - name: Clean up cosign RPM
      ansible.builtin.file:
        path: /tmp/cosign.rpm
        state: absent

