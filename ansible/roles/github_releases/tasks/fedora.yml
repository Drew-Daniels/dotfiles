# ---- obsidian ----
- name: Get latest obsidian release
  ansible.builtin.uri:
    url: https://api.github.com/repos/obsidianmd/obsidian-releases/releases/latest
    headers: "{{ github_api_headers }}"
    return_content: true
  register: obsidian_release

- name: Get current obsidian version
  ansible.builtin.shell:
    cmd: "obsidian --version 2>/dev/null"
  register: obsidian_current
  changed_when: false
  failed_when: false

- name: Set obsidian version facts
  ansible.builtin.set_fact:
    obsidian_latest: "{{ obsidian_release.json.tag_name | regex_replace('^v', '') }}"
    obsidian_installed: "{{ obsidian_current.stdout | default('') }}"

- name: Install/upgrade obsidian
  when: obsidian_installed != obsidian_latest
  block:
    - name: Find obsidian AppImage URL
      ansible.builtin.set_fact:
        obsidian_url: "{{ obsidian_release.json.assets | selectattr('name', 'contains', 'amd64.AppImage') | map(attribute='browser_download_url') | first }}"

    - name: Download obsidian AppImage
      ansible.builtin.get_url:
        url: "{{ obsidian_url }}"
        dest: /tmp/obsidian.AppImage
        mode: "0755"

    - name: Install obsidian
      become: true
      ansible.builtin.copy:
        src: /tmp/obsidian.AppImage
        dest: /usr/local/bin/obsidian
        remote_src: true
        mode: "0755"

    - name: Clean up obsidian
      ansible.builtin.file:
        path: /tmp/obsidian.AppImage
        state: absent
