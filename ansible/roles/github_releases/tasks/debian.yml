# ---- restic ----
- name: Check if restic is installed
  ansible.builtin.command:
    cmd: which restic
  register: restic_check
  changed_when: false
  failed_when: false

- name: Install restic
  when: restic_check.rc != 0
  block:
    - name: Get latest restic release
      ansible.builtin.uri:
        url: https://api.github.com/repos/restic/restic/releases/latest
        return_content: true
      register: restic_release

    - name: Set restic version
      ansible.builtin.set_fact:
        restic_version: "{{ restic_release.json.tag_name | regex_replace('^v', '') }}"

    - name: Download restic
      ansible.builtin.get_url:
        url: "https://github.com/restic/restic/releases/download/v{{ restic_version }}/restic_{{ restic_version }}_linux_amd64.bz2"
        dest: /tmp/restic.bz2
        mode: "0644"

    - name: Extract restic
      ansible.builtin.shell:
        cmd: bunzip2 /tmp/restic.bz2

    - name: Install restic
      become: true
      ansible.builtin.copy:
        src: /tmp/restic
        dest: /usr/local/bin/restic
        remote_src: true
        mode: "0755"

    - name: Generate restic bash completions
      become: true
      ansible.builtin.shell:
        cmd: restic generate --bash-completion /usr/share/bash-completion/completions/restic

