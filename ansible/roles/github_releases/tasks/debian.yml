# ---- tmux (build from source on Debian) ----
- name: Get latest tmux release
  ansible.builtin.uri:
    url: https://api.github.com/repos/tmux/tmux/releases/latest
    headers: "{{ github_api_headers }}"
    return_content: true
  register: tmux_release

- name: Get current tmux version
  ansible.builtin.shell:
    cmd: "tmux -V | cut -d ' ' -f2"
  register: tmux_current
  changed_when: false
  failed_when: false

- name: Install/upgrade tmux from source
  when: tmux_current.stdout | default('') != tmux_release.json.tag_name
  block:
    - name: Install tmux build dependencies
      become: true
      ansible.builtin.apt:
        name:
          - libevent-dev
          - ncurses-dev
          - build-essential
          - bison
          - pkg-config
        state: present

    - name: Download tmux source
      ansible.builtin.get_url:
        url: "https://github.com/tmux/tmux/releases/download/{{ tmux_release.json.tag_name }}/tmux-{{ tmux_release.json.tag_name }}.tar.gz"
        dest: /tmp/tmux.tar.gz
        mode: "0644"

    - name: Extract tmux
      ansible.builtin.unarchive:
        src: /tmp/tmux.tar.gz
        dest: /tmp
        remote_src: true

    - name: Configure tmux
      ansible.builtin.command:
        cmd: ./configure
        chdir: "/tmp/tmux-{{ tmux_release.json.tag_name }}"

    - name: Build tmux
      community.general.make:
        chdir: "/tmp/tmux-{{ tmux_release.json.tag_name }}"

    - name: Install tmux
      become: true
      community.general.make:
        chdir: "/tmp/tmux-{{ tmux_release.json.tag_name }}"
        target: install

    - name: Clean up tmux build
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/tmux.tar.gz
        - "/tmp/tmux-{{ tmux_release.json.tag_name }}"

# ---- JetBrains Mono Nerd Font ----
- name: Get latest nerd-fonts release
  ansible.builtin.uri:
    url: https://api.github.com/repos/ryanoasis/nerd-fonts/releases/latest
    headers: "{{ github_api_headers }}"
    return_content: true
  register: nerd_fonts_release

- name: Check nerd font file
  ansible.builtin.stat:
    path: "{{ ansible_facts['env'].HOME }}/.local/share/fonts/JetBrainsMonoNerdFont-Regular.ttf"
  register: nerd_font_check

- name: Get nerd font file modification date
  ansible.builtin.shell:
    cmd: "date +%s -r {{ ansible_facts['env'].HOME }}/.local/share/fonts/JetBrainsMonoNerdFont-Regular.ttf"
  register: nerd_font_mtime
  changed_when: false
  failed_when: false
  when: nerd_font_check.stat.exists

- name: Set nerd font version facts
  ansible.builtin.set_fact:
    nf_version: "{{ nerd_fonts_release.json.tag_name | regex_replace('^v', '') }}"
    nf_release_date: "{{ nerd_fonts_release.json.published_at | regex_replace('T.*', '') }}"
    nf_installed: "{{ nerd_font_check.stat.exists }}"

- name: Get nerd font release date as epoch
  ansible.builtin.shell:
    cmd: "date -d '{{ nf_release_date }}' +%s"
  register: nf_release_epoch
  changed_when: false

- name: Install/upgrade JetBrains Mono Nerd Font
  when: not nf_installed or (nerd_font_mtime.stdout | default('0') | int) < (nf_release_epoch.stdout | int)
  block:
    - name: Create fonts directory
      ansible.builtin.file:
        path: "{{ ansible_facts['env'].HOME }}/.local/share/fonts"
        state: directory
        mode: "0755"

    - name: Download JetBrainsMono Nerd Font
      ansible.builtin.get_url:
        url: "https://github.com/ryanoasis/nerd-fonts/releases/download/v{{ nf_version }}/JetBrainsMono.zip"
        dest: /tmp/JetBrainsMono.zip
        mode: "0644"

    - name: Extract fonts
      ansible.builtin.unarchive:
        src: /tmp/JetBrainsMono.zip
        dest: "{{ ansible_facts['env'].HOME }}/.local/share/fonts"
        remote_src: true

    - name: Refresh font cache
      ansible.builtin.command:
        cmd: fc-cache -fv

    - name: Clean up font zip
      ansible.builtin.file:
        path: /tmp/JetBrainsMono.zip
        state: absent

# ---- yq ----
- name: Get latest yq release
  ansible.builtin.uri:
    url: https://api.github.com/repos/mikefarah/yq/releases/latest
    headers: "{{ github_api_headers }}"
    return_content: true
  register: yq_release

- name: Get current yq version
  ansible.builtin.shell:
    cmd: "yq --version | cut -d ' ' -f4"
  register: yq_current
  changed_when: false
  failed_when: false

- name: Install/upgrade yq
  when: yq_current.stdout | default('') != yq_release.json.tag_name
  block:
    - name: Download yq
      ansible.builtin.get_url:
        url: "https://github.com/mikefarah/yq/releases/download/{{ yq_release.json.tag_name }}/yq_linux_amd64.tar.gz"
        dest: /tmp/yq.tar.gz
        mode: "0644"

    - name: Download yq checksum files
      ansible.builtin.get_url:
        url: "https://github.com/mikefarah/yq/releases/download/{{ yq_release.json.tag_name }}/{{ item }}"
        dest: "/tmp/{{ item }}"
        mode: "0644"
      loop:
        - checksums
        - checksums_hashes_order
        - extract-checksum.sh

    - name: Verify yq checksum
      ansible.builtin.shell:
        cmd: |
          chmod +x /tmp/extract-checksum.sh
          cd /tmp && ./extract-checksum.sh SHA-256 yq_linux_amd64.tar.gz | awk '{ print $2 " " $1}' | sha256sum -c --status
      changed_when: false

    - name: Extract yq
      ansible.builtin.unarchive:
        src: /tmp/yq.tar.gz
        dest: /tmp
        remote_src: true

    - name: Install yq
      become: true
      ansible.builtin.copy:
        src: /tmp/yq_linux_amd64
        dest: /usr/local/bin/yq
        remote_src: true
        mode: "0755"

    - name: Clean up yq
      ansible.builtin.file:
        path: "/tmp/{{ item }}"
        state: absent
      loop:
        - yq.tar.gz
        - yq_linux_amd64
        - checksums
        - checksums_hashes_order
        - extract-checksum.sh
        - yq.1
        - install-man-page.sh

# ---- ImageMagick ----
- name: Get latest ImageMagick release
  ansible.builtin.uri:
    url: https://api.github.com/repos/ImageMagick/ImageMagick/releases/latest
    headers: "{{ github_api_headers }}"
    return_content: true
  register: magick_release

- name: Get current ImageMagick version
  ansible.builtin.shell:
    cmd: "magick -version | head -n1 | cut -d ' ' -f3"
  register: magick_current
  changed_when: false
  failed_when: false

- name: Install/upgrade ImageMagick
  when: magick_current.stdout | default('') != magick_release.json.tag_name
  block:
    - name: Find AppImage download URL
      ansible.builtin.set_fact:
        magick_url: "{{ magick_release.json.assets | selectattr('name', 'contains', 'clang-x86_64.AppImage') | map(attribute='browser_download_url') | first }}"

    - name: Download ImageMagick AppImage
      ansible.builtin.get_url:
        url: "{{ magick_url }}"
        dest: /tmp/magick
        mode: "0755"

    - name: Install ImageMagick
      become: true
      ansible.builtin.copy:
        src: /tmp/magick
        dest: /usr/local/bin/magick
        remote_src: true
        mode: "0755"

    - name: Clean up ImageMagick
      ansible.builtin.file:
        path: /tmp/magick
        state: absent

