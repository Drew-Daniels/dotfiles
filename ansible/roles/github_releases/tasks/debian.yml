# ---- ctags (nightly build, compare abbreviated SHA) ----
- name: Get latest ctags nightly release
  ansible.builtin.uri:
    url: https://api.github.com/repos/universal-ctags/ctags-nightly-build/releases/latest
    headers: "{{ github_api_headers }}"
    return_content: true
  register: ctags_release

- name: Get current ctags SHA
  ansible.builtin.shell:
    cmd: "ctags --version | head -n1 | sed 's/.*\\(\\([a-z0-9]*\\)\\).*/\\1/' | head -c7"
  register: ctags_current
  changed_when: false
  failed_when: false

- name: Set ctags version facts
  ansible.builtin.set_fact:
    ctags_tag: "{{ ctags_release.json.tag_name }}"
    ctags_release_date: "{{ ctags_release.json.tag_name.split('+')[0] }}"
    ctags_latest_sha: "{{ ctags_release.json.tag_name.split('+')[1] | default('') }}"
    ctags_installed_sha: "{{ ctags_current.stdout | default('') }}"

- name: Install/upgrade ctags
  when: ctags_installed_sha == '' or ctags_latest_sha[:7] != ctags_installed_sha
  block:
    - name: Download ctags deb
      ansible.builtin.get_url:
        url: "https://github.com/universal-ctags/ctags-nightly-build/releases/download/{{ ctags_release_date | urlencode }}%2B{{ ctags_latest_sha }}/uctags-{{ ctags_release_date }}-linux-x86_64.deb"
        dest: /tmp/ctags.deb
        mode: "0644"

    - name: Install ctags deb
      become: true
      ansible.builtin.apt:
        deb: /tmp/ctags.deb

    - name: Clean up ctags deb
      ansible.builtin.file:
        path: /tmp/ctags.deb
        state: absent

