# ---- restic ----
- name: Get latest restic release
  ansible.builtin.uri:
    url: https://api.github.com/repos/restic/restic/releases/latest
    headers: "{{ github_api_headers }}"
    return_content: true
  register: restic_release

- name: Get current restic version
  ansible.builtin.shell:
    cmd: "restic version | cut -d ' ' -f2"
  register: restic_current
  changed_when: false
  failed_when: false

- name: Set restic version facts
  ansible.builtin.set_fact:
    restic_latest: "{{ restic_release.json.tag_name | regex_replace('^v', '') }}"
    restic_installed: "{{ restic_current.stdout | default('') }}"

- name: Install/upgrade restic
  when: restic_installed != restic_latest
  block:
    - name: Download restic
      ansible.builtin.get_url:
        url: "https://github.com/restic/restic/releases/download/v{{ restic_latest }}/restic_{{ restic_latest }}_linux_amd64.bz2"
        dest: /tmp/restic.bz2
        mode: "0644"

    - name: Extract restic
      ansible.builtin.shell:
        cmd: bunzip2 -f /tmp/restic.bz2

    - name: Install restic
      become: true
      ansible.builtin.copy:
        src: /tmp/restic
        dest: /usr/local/bin/restic
        remote_src: true
        mode: "0755"

    - name: Generate restic bash completions
      become: true
      ansible.builtin.shell:
        cmd: restic generate --bash-completion /usr/share/bash-completion/completions/restic

    - name: Clean up restic
      ansible.builtin.file:
        path: /tmp/restic
        state: absent

