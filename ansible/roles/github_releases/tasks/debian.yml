    - name: Verify ripgrep checksum
      ansible.builtin.shell:
        cmd: "cd /tmp && sha256sum -c ripgrep.deb.sha256 --status"
      changed_when: false

    - name: Install ripgrep deb
      become: true
      ansible.builtin.apt:
        deb: /tmp/ripgrep.deb

    - name: Clean up ripgrep
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/ripgrep.deb
        - /tmp/ripgrep.deb.sha256

