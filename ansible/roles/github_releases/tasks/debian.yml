    cmd: "rg --version | head -n1 | cut -d ' ' -f2"
  register: rg_current
  changed_when: false
  failed_when: false

- name: Set ripgrep version facts
  ansible.builtin.set_fact:
    rg_latest: "{{ rg_release.json.tag_name | regex_replace('^v?', '') }}"
    rg_installed: "{{ rg_current.stdout | default('') }}"

- name: Install/upgrade ripgrep
  when: rg_installed != rg_latest
  block:
    - name: Download ripgrep deb
