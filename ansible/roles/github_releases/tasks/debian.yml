# ---- ImageMagick ----
- name: Check if ImageMagick is installed
  ansible.builtin.command:
    cmd: which magick
  register: magick_check
  changed_when: false
  failed_when: false

- name: Install ImageMagick
  when: magick_check.rc != 0
  block:
    - name: Get latest ImageMagick release
      ansible.builtin.uri:
        url: https://api.github.com/repos/ImageMagick/ImageMagick/releases/latest
        return_content: true
      register: magick_release

    - name: Find AppImage download URL
      ansible.builtin.set_fact:
        magick_url: "{{ magick_release.json.assets | selectattr('name', 'contains', 'clang-x86_64.AppImage') | map(attribute='browser_download_url') | first }}"

    - name: Download ImageMagick AppImage
      ansible.builtin.get_url:
        url: "{{ magick_url }}"
        dest: /tmp/magick
        mode: "0755"

    - name: Install ImageMagick
      become: true
      ansible.builtin.copy:
        src: /tmp/magick
        dest: /usr/local/bin/magick
        remote_src: true
        mode: "0755"

    - name: Clean up ImageMagick
      ansible.builtin.file:
        path: /tmp/magick
        state: absent

