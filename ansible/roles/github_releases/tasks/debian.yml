# ---- clangd ----
- name: Check if clangd is installed
  ansible.builtin.command:
    cmd: which clangd
  register: clangd_check
  changed_when: false
  failed_when: false

- name: Install clangd
  when: clangd_check.rc != 0
  block:
    - name: Get latest clangd release
      ansible.builtin.uri:
        url: https://api.github.com/repos/clangd/clangd/releases/latest
        return_content: true
      register: clangd_release

    - name: Download clangd
      ansible.builtin.get_url:
        url: "https://github.com/clangd/clangd/releases/download/{{ clangd_release.json.tag_name }}/clangd-linux-{{ clangd_release.json.tag_name }}.zip"
        dest: /tmp/clangd.zip
        mode: "0644"

    - name: Extract clangd
      ansible.builtin.unarchive:
        src: /tmp/clangd.zip
        dest: /tmp
        remote_src: true

    - name: Install clangd
      become: true
      ansible.builtin.copy:
        src: "/tmp/clangd_{{ clangd_release.json.tag_name }}/bin/clangd"
        dest: /usr/local/bin/clangd
        remote_src: true
        mode: "0755"

    - name: Clean up clangd
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/clangd.zip
        - "/tmp/clangd_{{ clangd_release.json.tag_name }}"
