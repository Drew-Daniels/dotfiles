    - name: Download ripgrep checksum
      ansible.builtin.get_url:
        url: "https://github.com/BurntSushi/ripgrep/releases/download/{{ rg_release.json.tag_name }}/ripgrep_{{ rg_latest }}-1_amd64.deb.sha256"
        dest: /tmp/ripgrep.deb.sha256
