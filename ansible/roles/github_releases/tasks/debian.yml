# ---- tmux (build from source on Debian) ----
- name: Check if tmux is installed
  ansible.builtin.command:
    cmd: which tmux
  register: tmux_check
  changed_when: false
  failed_when: false

- name: Install tmux from source
  when: tmux_check.rc != 0
  block:
    - name: Install tmux build dependencies
      become: true
      ansible.builtin.apt:
        name:
          - libevent-dev
          - ncurses-dev
          - build-essential
          - bison
          - pkg-config
        state: present

    - name: Get latest tmux release
      ansible.builtin.uri:
        url: https://api.github.com/repos/tmux/tmux/releases/latest
        return_content: true
      register: tmux_release

    - name: Download tmux source
      ansible.builtin.get_url:
        url: "https://github.com/tmux/tmux/releases/download/{{ tmux_release.json.tag_name }}/tmux-{{ tmux_release.json.tag_name }}.tar.gz"
        dest: /tmp/tmux.tar.gz
        mode: "0644"

    - name: Extract tmux
      ansible.builtin.unarchive:
        src: /tmp/tmux.tar.gz
        dest: /tmp
        remote_src: true

    - name: Configure tmux
      ansible.builtin.command:
        cmd: ./configure
        chdir: "/tmp/tmux-{{ tmux_release.json.tag_name }}"

    - name: Build tmux
      community.general.make:
        chdir: "/tmp/tmux-{{ tmux_release.json.tag_name }}"

    - name: Install tmux
      become: true
      community.general.make:
        chdir: "/tmp/tmux-{{ tmux_release.json.tag_name }}"
        target: install

    - name: Clean up tmux build
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/tmux.tar.gz
        - "/tmp/tmux-{{ tmux_release.json.tag_name }}"

# ---- JetBrains Mono Nerd Font ----
- name: Check if JetBrains Mono Nerd Font is installed
  ansible.builtin.stat:
    path: "{{ ansible_facts['env'].HOME }}/.local/share/fonts/JetBrainsMonoNerdFont-Regular.ttf"
  register: nerd_font_check

- name: Install JetBrains Mono Nerd Font
  when: not nerd_font_check.stat.exists
  block:
    - name: Create fonts directory
      ansible.builtin.file:
        path: "{{ ansible_facts['env'].HOME }}/.local/share/fonts"
        state: directory
        mode: "0755"

    - name: Get latest nerd-fonts release
      ansible.builtin.uri:
        url: https://api.github.com/repos/ryanoasis/nerd-fonts/releases/latest
        return_content: true
      register: nerd_fonts_release

    - name: Set nerd fonts version
      ansible.builtin.set_fact:
        nf_version: "{{ nerd_fonts_release.json.tag_name | regex_replace('^v', '') }}"

    - name: Download JetBrainsMono Nerd Font
      ansible.builtin.get_url:
        url: "https://github.com/ryanoasis/nerd-fonts/releases/download/v{{ nf_version }}/JetBrainsMono.zip"
        dest: /tmp/JetBrainsMono.zip
        mode: "0644"

    - name: Extract fonts
      ansible.builtin.unarchive:
        src: /tmp/JetBrainsMono.zip
        dest: "{{ ansible_facts['env'].HOME }}/.local/share/fonts"
        remote_src: true

    - name: Refresh font cache
      ansible.builtin.command:
        cmd: fc-cache -fv

    - name: Clean up font zip
      ansible.builtin.file:
        path: /tmp/JetBrainsMono.zip
        state: absent

