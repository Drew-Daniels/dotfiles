---
# ---- cosign ----
- name: Get latest cosign release
  ansible.builtin.uri:
    url: https://api.github.com/repos/sigstore/cosign/releases/latest
    headers: "{{ github_api_headers }}"
    return_content: true
  register: cosign_release

- name: Get current cosign version
  ansible.builtin.shell:
    cmd: "cosign version 2>/dev/null | grep GitVersion | awk '{print $2}'"
  register: cosign_current
  changed_when: false
  failed_when: false

- name: Set cosign version facts
  ansible.builtin.set_fact:
    cosign_latest: "{{ cosign_release.json.tag_name | regex_replace('^v', '') }}"
    cosign_installed: "{{ cosign_current.stdout | default('') }}"

- name: Install/upgrade cosign
  when: cosign_installed != cosign_latest
  become: true
  block:
    - name: Download cosign binary
      ansible.builtin.get_url:
        url: "https://github.com/sigstore/cosign/releases/download/v{{ cosign_latest }}/cosign-linux-x86_64"
        dest: /usr/local/bin/cosign
        mode: "0755"
        force: true

# ---- chezmoi (requires cosign for signature verification) ----
- name: Get latest chezmoi release
  ansible.builtin.uri:
    url: https://api.github.com/repos/twpayne/chezmoi/releases/latest
    headers: "{{ github_api_headers }}"
    return_content: true
  register: chezmoi_release

- name: Get current chezmoi version
  ansible.builtin.shell:
    cmd: "chezmoi --version | cut -d ' ' -f3 | cut -d 'v' -f2 | cut -d ',' -f1"
  register: chezmoi_current
  changed_when: false
  failed_when: false

- name: Set chezmoi version facts
  ansible.builtin.set_fact:
    chezmoi_latest: "{{ chezmoi_release.json.tag_name | regex_replace('^v', '') }}"
    chezmoi_installed: "{{ chezmoi_current.stdout | default('') }}"

- name: Install/upgrade chezmoi
  when: chezmoi_installed != chezmoi_latest
  block:
    - name: Download chezmoi deb and verification files
      ansible.builtin.get_url:
        url: "https://github.com/twpayne/chezmoi/releases/download/v{{ chezmoi_latest }}/{{ item }}"
        dest: "/tmp/{{ item }}"
        mode: "0644"
      loop:
        - "chezmoi_{{ chezmoi_latest }}_linux_amd64.deb"
        - "chezmoi_{{ chezmoi_latest }}_checksums.txt"
        - "chezmoi_{{ chezmoi_latest }}_checksums.txt.sig"
        - "chezmoi_cosign.pub"

    - name: Verify cosign signature on chezmoi checksums
      ansible.builtin.command:
        cmd: >
          cosign verify-blob
          --key /tmp/chezmoi_cosign.pub
          --signature /tmp/chezmoi_{{ chezmoi_latest }}_checksums.txt.sig
          /tmp/chezmoi_{{ chezmoi_latest }}_checksums.txt
      changed_when: false

    - name: Verify chezmoi deb checksum
      ansible.builtin.shell:
        cmd: |
          expected=$(grep linux_amd64.deb /tmp/chezmoi_{{ chezmoi_latest }}_checksums.txt)
          actual=$(cd /tmp && sha256sum chezmoi_{{ chezmoi_latest }}_linux_amd64.deb)
          [ "$actual" = "$expected" ]
      changed_when: false

    - name: Install chezmoi deb
      become: true
      ansible.builtin.apt:
        deb: "/tmp/chezmoi_{{ chezmoi_latest }}_linux_amd64.deb"

    - name: Clean up chezmoi files
      ansible.builtin.file:
        path: "/tmp/{{ item }}"
        state: absent
      loop:
        - "chezmoi_{{ chezmoi_latest }}_linux_amd64.deb"
        - "chezmoi_{{ chezmoi_latest }}_checksums.txt"
        - "chezmoi_{{ chezmoi_latest }}_checksums.txt.sig"
        - "chezmoi_cosign.pub"

# ---- jq ----
- name: Get latest jq release
  ansible.builtin.uri:
    url: https://api.github.com/repos/jqlang/jq/releases/latest
    headers: "{{ github_api_headers }}"
    return_content: true
  register: jq_release

- name: Get current jq version
  ansible.builtin.shell:
    cmd: "jq --version"
  register: jq_current
  changed_when: false
  failed_when: false

- name: Install/upgrade jq
  when: jq_current.stdout | default('') != jq_release.json.tag_name
  become: true
  block:
    - name: Download jq binary
      ansible.builtin.get_url:
        url: "https://github.com/jqlang/jq/releases/download/{{ jq_release.json.tag_name }}/jq-linux-amd64"
        dest: /tmp/jq
        mode: "0755"

    - name: Download jq checksums
      ansible.builtin.get_url:
        url: "https://github.com/jqlang/jq/releases/download/{{ jq_release.json.tag_name }}/sha256sum.txt"
        dest: /tmp/jq-sha256sum.txt
        mode: "0644"

    - name: Verify jq checksum
      ansible.builtin.shell:
        cmd: |
          expected=$(grep jq-linux-amd64 /tmp/jq-sha256sum.txt)
          actual=$(cd /tmp && sha256sum jq)
          [ "$actual" = "$expected" ]
      changed_when: false

    - name: Install jq
      ansible.builtin.copy:
        src: /tmp/jq
        dest: /usr/local/bin/jq
        remote_src: true
        mode: "0755"

    - name: Clean up jq
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/jq
        - /tmp/jq-sha256sum.txt

