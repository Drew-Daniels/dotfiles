---
# ---- cosign ----
- name: Check if cosign is installed
  ansible.builtin.command:
    cmd: which cosign
  register: cosign_check
  changed_when: false
  failed_when: false

- name: Install cosign
  when: cosign_check.rc != 0
  become: true
  block:
    - name: Download cosign binary
      ansible.builtin.get_url:
        url: https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-x86_64
        dest: /usr/local/bin/cosign
        mode: "0755"

# ---- jq ----
- name: Check if jq is installed
  ansible.builtin.command:
    cmd: which jq
  register: jq_check
  changed_when: false
  failed_when: false

- name: Install jq
  when: jq_check.rc != 0
  become: true
  block:
    - name: Download jq binary
      ansible.builtin.get_url:
        url: https://github.com/jqlang/jq/releases/download/jq-1.7.1/jq-linux-amd64
        dest: /usr/local/bin/jq
        mode: "0755"

# ---- git-credential-oauth ----
- name: Check if git-credential-oauth is installed
  ansible.builtin.command:
    cmd: which git-credential-oauth
  register: gco_check
  changed_when: false
  failed_when: false

- name: Install git-credential-oauth
  when: gco_check.rc != 0
  block:
    - name: Get latest git-credential-oauth release
      ansible.builtin.uri:
        url: https://api.github.com/repos/hickford/git-credential-oauth/releases/latest
        return_content: true
      register: gco_release

    - name: Set git-credential-oauth version
      ansible.builtin.set_fact:
        gco_version: "{{ gco_release.json.tag_name | regex_replace('^v', '') }}"

    - name: Download git-credential-oauth
      ansible.builtin.get_url:
        url: "https://github.com/hickford/git-credential-oauth/releases/download/v{{ gco_version }}/git-credential-oauth_{{ gco_version }}_linux_amd64.tar.gz"
        dest: /tmp/git-credential-oauth.tar.gz
        mode: "0644"

    - name: Extract git-credential-oauth
      ansible.builtin.unarchive:
        src: /tmp/git-credential-oauth.tar.gz
        dest: /tmp
        remote_src: true

    - name: Install git-credential-oauth
      become: true
      ansible.builtin.copy:
        src: /tmp/git-credential-oauth
        dest: /usr/local/bin/git-credential-oauth
        remote_src: true
        mode: "0755"

    - name: Clean up git-credential-oauth
      ansible.builtin.file:
        path: /tmp/git-credential-oauth.tar.gz
        state: absent

